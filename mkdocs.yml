site_name: PartyService
site_description: Documentation for PartyService
site_author: bstummer
site_url: https://bstummer.github.io/PartyService/

repo_name: PartyService
repo_url: https://github.com/bstummer/PartyService
edit_uri: ""

theme:
  #logo: 
  #mkdosfavicon: assets/favicon.png
  #icon:
    #repo: fontawesome/brands/github
  name: material
  features:
    #- navigation.tabs
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  highlightjs: true
  hljs_languages:
    - lua

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bstummer/
      name: bstummer on GitHub

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home:
    - Introduction: index.md
    - Tutorial: tutorial.md
    - API: api.md
    - About: about.md
    - Changelog: changelog.md
